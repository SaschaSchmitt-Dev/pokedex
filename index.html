<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>

    <link rel="shortcut icon" href="./assets/icons/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="./styles/type-styles.css">
    <link rel="stylesheet" href="./styles/pokemon-dialog.css">
    <link rel="stylesheet" href="./styles/pokemon-cards.css">
    <link rel="stylesheet" href="./styles/loader.css">
    <link rel="stylesheet" href="./styles/assets.css">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/header.css">
    <link rel="stylesheet" href="./styles/footer.css">
    <link rel="stylesheet" href="./styles/variables.css">
    <link rel="stylesheet" href="style.css">

    <script src="./scripts/templates.js" defer></script>
    <script src="./scripts/pokemon.js" defer></script>
    <script src="./scripts/dialog.js" defer></script>
    <script src="script.js" defer></script>
</head>

<body onload="initPokemonDatabase()">
    <header>
        <div class="header_wrapper">
            <a href="#/index.html">Pokédex</a>
            <div class="search desktop">
                <input data-id="search-input" id="pokemonSearch" oninput="searchPokemon()" type="text" value=""
                    placeholder="Pokémon Namen eingeben (min. 3 Buchstaben)">
            </div>
        </div>
    </header>

    <main data-id="content">
        <section id="fetchPokemon" class="fetch_pokemon">

        </section>

        <dialog data-id="dialog" id="pokemonDetailsDialog" class="pokemon_details_dialog title_style"
            onclick="closeDialog('pokemonDetailsDialog')">
        </dialog>
    </main>

    <footer>
        <div class="footer_wrapper">
            <p>© created by Sascha Schmitt</p>
            <ul class="footer_links">
                <li>
                    <a href="./subpages/legal-notice.html">Impressum</a>
                </li>
                <li>
                    <a href="./subpages/privacy-policy.html">Datenschutz</a>
                </li>
            </ul>
        </div>
    </footer>

    <nav class="mobile_nav">
        <div class="search">
            <input data-id="search-input-mobile" id="pokemonSearchMobile" oninput="searchPokemon()" type="text" value=""
                placeholder="Pokémon (min. 3 Buchstaben)">
        </div>
    </nav>
</body>

</html>
